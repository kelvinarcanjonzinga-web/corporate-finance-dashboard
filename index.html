<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corporate Finance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <aside>
        <nav>
            <ul>
                <li><a href="#" class="is-active"> 📊 Visão Geral</a></li>
                <li><a href="#"> 💳 Transações</a></li>
                <li><a href="#"> 📄 Relatórios</a></li>
                <li><a href="#" id="definicoes"> ⚙️ Definições</a></li>
            </ul>
        </nav>

    </aside>

    <div class="main-wrapper">
        <header>
            <h1>Visão Geral</h1>
            <button id="newTransaction">+ Nova Transação</button>
        </header>
        <main>
            <section id="summarySection" class="dashboard-section">
                <h2>Resumo</h2>
                <article class="kpi-card" data-kpi="income">
                    <p class="kpi-label">Total de Receitas</p>
                    <p class="kpi-value">€ 0,00</p>
                </article>

                <article class="kpi-card" data-kpi="expense">
                    <p class="kpi-label">Total de Despesas</p>
                    <p class="kpi-value">€ 0,00</p>
                </article>

                <article class="kpi-card" data-kpi="balance">
                    <p class="kpi-label">Saldo Actual</p>
                    <p class="kpi-value">€ 0,00</p>
                </article>

                <article class="kpi-card" data-kpi="total-transactions">
                    <p class="kpi-label">Número de Vendas</p>
                    <p class="kpi-value">€ 0,00</p>
                </article>

                </section>
    
            <section id="chartsSection" class="dashboard-section">
                <h2>Gráficos</h2>

                <div id="financialChartContainer">
                    <canvas id="balanceChart"></canvas>
                </div>

                <div id="expenseChartContainer">
                    <canvas id="categoryChart"></canvas>
                </div>
            </section>
    
            <section id="transactionsSection" class="dashboard-section">
                <h2>Transações</h2>
                <input type="search" id="searchInput" class="search-input" placeholder="Pesquisar por descrição ou categoria..." aria-label="Pesquisar transações">

                <table>
                    <thead>
                        <tr>
                            <th scope="col">Descrição</th>
                            <th scope="col">Categoria</th>
                            <th scope="col">Data</th>
                            <th scope="col">Tipo</th>
                            <th scope="col">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList">
                        <!-- linhas de transações vão entrar aqui via JS -->
                    </tbody>
                </table>

            </section>
    
        </main>
    </div>

    <dialog id="transactionModal">
        <form method="dialog" id="transactionForm">
            <h2>Nova Transação</h2>

            <div class="form-group">
                <label for="modalType">Tipo</label>
                <select id="modalType" required>
                    <option value="income">Receita</option>
                    <option value="expense">Despesa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="modalDescription">Descrição</label>
                <input type="text" id="modalDescription" placeholder="Ex: Salário , Supermercado..." required>
            </div>

            <div class="form-group">
                <label for="modalAmount">Valor</label>
                <input type="number" id="modalAmount" step="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="modalDate">Data</label>
                <input type="date" id="modalDate" required>
            </div>

            <div class="form-group">
                <label for="modalCategory">Categoria</label>
                <select id="modalCategory" required>
                    <option value="vendas">Vendas</option>
                    <option value="servicos">Serviços</option>
                    <option value="marketing">Marketing</option>
                    <option value="outros">Outros</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" id="btnDialog">Guardar</button>
            </div>
        </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
